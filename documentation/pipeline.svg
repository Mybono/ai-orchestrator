<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .bg { fill: #0d1117; }
    .card { rx: 10; }

    /* ── colors ── */
    .c-gray-fill  { fill: #21262d; stroke: #30363d; }
    .c-purple-fill { fill: #1a1040; stroke: #6e40c9; }
    .c-blue-fill  { fill: #0c1a2e; stroke: #1f6feb; }
    .c-amber-fill { fill: #1a1200; stroke: #9e6a03; }
    .c-teal-fill  { fill: #051f1a; stroke: #1b7a6e; }
    .c-green-fill { fill: #0a1f0a; stroke: #238636; }
    .c-red-fill   { fill: #1f0a0a; stroke: #8b2020; }

    .t-white  { fill: #e6edf3; font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 600; }
    .t-muted  { fill: #8b949e; font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 11px; font-weight: 400; }
    .t-mono   { fill: #79c0ff; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10px; }
    .t-title  { fill: #e6edf3; font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 700; }
    .t-label  { fill: #f0883e; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; font-weight: 600; }
    .t-fail   { fill: #f85149; font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 10px; font-weight: 600; }
    .t-pass   { fill: #3fb950; font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 10px; font-weight: 600; }

    /* ── entrance animations (opacity + translateY) ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── arrow draw animation ── */
    @keyframes drawLine {
      from { stroke-dashoffset: 40; }
      to   { stroke-dashoffset: 0; }
    }

    /* ── active pulse on current step ── */
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.55; }
    }

    /* ── flowing dots on arrows ── */
    @keyframes flowDot {
      0%   { offset-distance: 0%;   opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }

    /* ── fail loop arrow dash ── */
    @keyframes dashFlow {
      from { stroke-dashoffset: 20; }
      to   { stroke-dashoffset: 0; }
    }

    /* timing */
    .g-trigger { opacity:0; animation: fadeUp .5s ease forwards; animation-delay: 0.2s; }
    .g-planner { opacity:0; animation: fadeUp .5s ease forwards; animation-delay: 1.0s; }
    .g-coder   { opacity:0; animation: fadeUp .5s ease forwards; animation-delay: 2.0s; }
    .g-build   { opacity:0; animation: fadeUp .5s ease forwards; animation-delay: 3.0s; }
    .g-review  { opacity:0; animation: fadeUp .5s ease forwards; animation-delay: 4.0s; }
    .g-commit  { opacity:0; animation: fadeUp .5s ease forwards; animation-delay: 5.0s; }
    .g-badges  { opacity:0; animation: fadeIn .6s ease forwards; animation-delay: 5.8s; }
    .g-fail    { opacity:0; animation: fadeIn .5s ease forwards; animation-delay: 3.4s; }

    .arr-1 { opacity:0; stroke-dasharray:30; stroke-dashoffset:30; animation: drawLine .4s ease forwards; animation-delay:0.7s; }
    .arr-2 { opacity:0; stroke-dasharray:30; stroke-dashoffset:30; animation: drawLine .4s ease forwards; animation-delay:1.7s; }
    .arr-3 { opacity:0; stroke-dasharray:30; stroke-dashoffset:30; animation: drawLine .4s ease forwards; animation-delay:2.7s; }
    .arr-4 { opacity:0; stroke-dasharray:30; stroke-dashoffset:30; animation: drawLine .4s ease forwards; animation-delay:3.7s; }
    .arr-5 { opacity:0; stroke-dasharray:30; stroke-dashoffset:30; animation: drawLine .4s ease forwards; animation-delay:4.7s; }
  </style>

  <marker id="arrowW" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#30363d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrowR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#f85149" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrowG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- background -->
<rect width="680" height="520" fill="#0d1117" rx="12"/>

<!-- top border accent -->
<rect x="0" y="0" width="680" height="3" fill="#6e40c9" rx="2"/>

<!-- title -->
<text x="340" y="34" text-anchor="middle" class="t-title" fill="#e6edf3">ai-orchestrator  /implement pipeline</text>
<text x="340" y="52" text-anchor="middle" class="t-muted">Claude Code · Ollama · Bash · zero Python</text>

<!-- ══ TRIGGER ══ -->
<g class="g-trigger">
  <rect x="200" y="66" width="280" height="46" rx="8" class="c-gray-fill" stroke-width="1"/>
  <text x="260" y="85" class="t-label">/implement</text>
  <text x="370" y="85" class="t-white" font-size="12">"Add OAuth flow"</text>
  <text x="340" y="103" text-anchor="middle" class="t-muted">slash command · Claude Code</text>
</g>

<!-- arrow 1 -->
<line x1="340" y1="112" x2="340" y2="130" stroke="#30363d" stroke-width="1.5" class="arr-1" marker-end="url(#arrowW)"/>

<!-- ══ PLANNER ══ -->
<g class="g-planner">
  <rect x="180" y="130" width="320" height="52" rx="8" class="c-purple-fill" stroke-width="1"/>
  <text x="340" y="151" text-anchor="middle" class="t-white">🗺  Planner agent</text>
  <text x="340" y="169" text-anchor="middle" class="t-muted">explores codebase · writes implementation plan</text>
</g>

<!-- arrow 2 -->
<line x1="340" y1="182" x2="340" y2="200" stroke="#30363d" stroke-width="1.5" class="arr-2" marker-end="url(#arrowW)"/>

<!-- ══ CODER ══ -->
<g class="g-coder">
  <rect x="180" y="200" width="320" height="52" rx="8" class="c-blue-fill" stroke-width="1"/>
  <text x="340" y="221" text-anchor="middle" class="t-white">⚙️  Coder agent</text>
  <text x="340" y="239" text-anchor="middle" class="t-muted">generates code via Ollama · role: coder</text>
</g>

<!-- arrow 3 -->
<line x1="340" y1="252" x2="340" y2="270" stroke="#30363d" stroke-width="1.5" class="arr-3" marker-end="url(#arrowW)"/>

<!-- ══ BUILD CHECK ══ -->
<g class="g-build">
  <rect x="180" y="270" width="320" height="52" rx="8" class="c-amber-fill" stroke-width="1"/>
  <text x="340" y="291" text-anchor="middle" class="t-white">🔨  Build check</text>
  <text x="340" y="309" text-anchor="middle" class="t-muted">compile · lint · bash scripts</text>
</g>

<!-- fail loop -->
<g class="g-fail">
  <path d="M180 296 L148 296 L148 226 L180 226"
        fill="none" stroke="#f85149" stroke-width="1.2"
        stroke-dasharray="5 3"
        marker-end="url(#arrowR)"
        style="animation: dashFlow 1.2s linear infinite; animation-delay: 3.6s;"/>
  <text x="136" y="262" text-anchor="middle" class="t-fail" transform="rotate(-90,136,262)">retry</text>
</g>

<!-- pass arrow -->
<g class="arr-4" style="opacity:0">
  <line x1="340" y1="322" x2="340" y2="340" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowG)"
        style="stroke-dasharray:25; stroke-dashoffset:25; animation: drawLine .4s ease forwards; animation-delay:3.7s;"/>
  <text x="356" y="334" class="t-pass">pass</text>
</g>

<!-- ══ REVIEWER ══ -->
<g class="g-review">
  <rect x="180" y="340" width="320" height="52" rx="8" class="c-teal-fill" stroke-width="1"/>
  <text x="340" y="361" text-anchor="middle" class="t-white">🔍  Reviewer agent</text>
  <text x="340" y="379" text-anchor="middle" class="t-muted">checks code standarts · role: reviewer</text>
</g>

<!-- arrow 5 -->
<line x1="340" y1="392" x2="340" y2="410" stroke="#30363d" stroke-width="1.5" class="arr-5" marker-end="url(#arrowW)"/>

<!-- ══ COMMIT ══ -->
<g class="g-commit">
  <rect x="180" y="410" width="320" height="52" rx="8" class="c-green-fill" stroke-width="1"/>
  <text x="340" y="431" text-anchor="middle" class="t-white">✅  Commit agent</text>
  <text x="340" y="449" text-anchor="middle" class="t-muted">stages · writes message · git commit</text>
</g>

<!-- ══ MODEL BADGES ══ -->
<g class="g-badges">
  <!-- planner badge -->
  <rect x="514" y="143" width="148" height="22" rx="11" fill="#1a1040" stroke="#6e40c9" stroke-width="0.8"/>
  <text x="588" y="158" text-anchor="middle" class="t-mono">qwen2.5-coder:7b</text>
  <line x1="500" y1="154" x2="514" y2="154" stroke="#6e40c9" stroke-width="0.8" stroke-dasharray="3 2"/>

  <!-- coder badge -->
  <rect x="514" y="213" width="148" height="22" rx="11" fill="#0c1a2e" stroke="#1f6feb" stroke-width="0.8"/>
  <text x="588" y="228" text-anchor="middle" class="t-mono" fill="#58a6ff">14B-IQ4_XS</text>
  <line x1="500" y1="224" x2="514" y2="224" stroke="#1f6feb" stroke-width="0.8" stroke-dasharray="3 2"/>

  <!-- reviewer badge -->
  <rect x="514" y="353" width="148" height="22" rx="11" fill="#051f1a" stroke="#1b7a6e" stroke-width="0.8"/>
  <text x="588" y="368" text-anchor="middle" class="t-mono" fill="#56d364">qwen2.5-coder:7b</text>
  <line x1="500" y1="364" x2="514" y2="364" stroke="#1b7a6e" stroke-width="0.8" stroke-dasharray="3 2"/>

  <!-- commit badge -->
  <rect x="514" y="423" width="148" height="22" rx="11" fill="#0a1f0a" stroke="#238636" stroke-width="0.8"/>
  <text x="588" y="438" text-anchor="middle" class="t-mono" fill="#3fb950">qwen2.5-coder:7b</text>
  <line x1="500" y1="434" x2="514" y2="434" stroke="#238636" stroke-width="0.8" stroke-dasharray="3 2"/>

  <!-- call_ollama.sh legend -->
  <rect x="16" y="340" width="150" height="90" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="91" y="360" text-anchor="middle" fill="#8b949e" font-family="-apple-system,sans-serif" font-size="10">powered by</text>
  <text x="91" y="378" text-anchor="middle" fill="#79c0ff" font-family="'SF Mono','Fira Code',monospace" font-size="11" font-weight="600">call_ollama.sh</text>
  <text x="91" y="396" text-anchor="middle" fill="#8b949e" font-family="-apple-system,sans-serif" font-size="10">curl + jq · zero Python</text>
  <text x="91" y="414" text-anchor="middle" fill="#8b949e" font-family="-apple-system,sans-serif" font-size="10">llm-config.json</text>
  <line x1="166" y1="385" x2="180" y2="385" stroke="#30363d" stroke-width="0.8" stroke-dasharray="3 2"/>
</g>

<!-- bottom caption -->
<text x="340" y="502" text-anchor="middle" fill="#3d444d" font-family="-apple-system,sans-serif" font-size="10">github.com/Mybono/ai-orchestrator</text>

</svg>
